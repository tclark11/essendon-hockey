name: Update Hockey Results

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 7:00 PM Melbourne (AEST). See note below.
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write           # allows committing results.json back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "results-bot"
          git config user.email "bot@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "Update results $(date -u +%Y-%m-%d)"
          git push

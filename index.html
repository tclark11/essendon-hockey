<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essendon Hockey — Results</title>
<style>
  body { font-family: system-ui, sans-serif; background:#f4f4f5; color:#18181b; margin:0; padding:24px; max-width:800px; margin:0 auto; }
  h1 { color:#b91c1c; margin-bottom:4px; }
  .updated { color:#71717a; font-size:14px; margin-bottom:24px; }
  .grade { background:#fff; border-radius:12px; padding:16px 20px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .grade h2 { margin:0 0 12px; font-size:18px; color:#b91c1c; }
  .round { border-top:1px solid #e4e4e7; padding:12px 0; }
  .round-title { font-weight:600; color:#52525b; font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .game { display:flex; align-items:center; gap:12px; padding:8px 0; flex-wrap:wrap; }
  .teams { flex:1; min-width:220px; }
  .ess { font-weight:700; }
  .score { font-weight:700; font-size:16px; min-width:52px; text-align:center; }
  .pending { color:#a1a1aa; font-style:italic; font-size:13px; }
  button { background:#b91c1c; color:#fff; border:0; border-radius:6px; padding:6px 12px; font-size:13px; cursor:pointer; }
  button:hover { background:#991b1b; }
  .empty { color:#71717a; padding:20px; text-align:center; }
</style>
</head>
<body>
  <h1>🏑 Essendon Hockey — Results</h1>
  <div class="updated" id="updated">Loading…</div>
  <div id="content"></div>

<script>
const CLUB = "Essendon Hockey";
function bold(name){ return name.includes(CLUB) ? `<span class="ess">${name}</span>` : name; }

async function load() {
  try {
    const res = await fetch('results.json?' + Date.now());
    const data = await res.json();
    document.getElementById('updated').textContent = 'Last updated: ' + data.updated.replace('T',' ');
    const c = document.getElementById('content');

    let anyGames = false;
    data.grades.forEach(grade => {
      const roundNos = Object.keys(grade.rounds).sort((a,b)=>b-a);
      if (roundNos.length === 0) return;
      anyGames = true;
      const g = document.createElement('div');
      g.className = 'grade';
      g.innerHTML = `<h2>${grade.label}</h2>`;
      roundNos.forEach(rn => {
        const rd = document.createElement('div');
        rd.className = 'round';
        rd.innerHTML = `<div class="round-title">Round ${rn}</div>`;
        grade.rounds[rn].forEach(game => {
          const scoreHtml = game.played
            ? `<span class="score">${game.score}</span>`
            : `<span class="pending">${game.date} ${game.time}</span>`;
          const post = game.played
            ? `🏑 ${grade.label} R${rn}: ${game.home} ${game.score} ${game.away}`
            : `🏑 ${grade.label} R${rn}: ${game.home} vs ${game.away} — ${game.date} ${game.time}`;
          const row = document.createElement('div');
          row.className = 'game';
          row.innerHTML =
            `<span class="teams">${bold(game.home)} vs ${bold(game.away)}</span>${scoreHtml}` +
            `<button onclick='navigator.clipboard.writeText(${JSON.stringify(post)});this.textContent="Copied!";setTimeout(()=>this.textContent="Copy post",1500)'>Copy post</button>`;
          rd.appendChild(row);
        });
        g.appendChild(rd);
      });
      c.appendChild(g);
    });

    if (!anyGames) c.innerHTML = '<div class="empty">No results yet — check back after the next scrape.</div>';
  } catch (e) {
    document.getElementById('updated').textContent = 'Could not load results.json yet. Run the scraper from the Actions tab.';
  }
}
load();
</script>
</body>
</html>

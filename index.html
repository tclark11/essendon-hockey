<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essendon Hockey — Results</title>
<style>
  body { font-family: system-ui, sans-serif; background:#f4f4f5; color:#18181b; margin:0 auto; padding:24px; max-width:820px; }
  h1 { color:#b91c1c; margin-bottom:4px; }
  .updated { color:#71717a; font-size:14px; margin-bottom:16px; }
  .tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; position:sticky; top:0; background:#f4f4f5; padding:8px 0; z-index:10; }
  .tabs button { background:#e4e4e7; color:#3f3f46; border:0; border-radius:6px; padding:7px 13px; font-size:14px; cursor:pointer; font-weight:600; }
  .tabs button:hover { background:#d4d4d8; }
  .tabs button.active { background:#b91c1c; color:#fff; }
  .grade { background:#fff; border-radius:12px; padding:16px 20px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .grade h2 { margin:0 0 10px; font-size:17px; color:#b91c1c; }
  .game { display:flex; align-items:center; gap:12px; padding:8px 0; flex-wrap:wrap; border-top:1px solid #f4f4f5; }
  .game:first-of-type { border-top:0; }
  .teams { flex:1; min-width:200px; }
  .ess { font-weight:700; }
  .score { font-weight:700; font-size:16px; min-width:52px; text-align:center; }
  .result { font-weight:700; font-size:13px; border-radius:5px; padding:2px 8px; min-width:22px; text-align:center; }
  .result.W { background:#dcfce7; color:#166534; }
  .result.L { background:#fee2e2; color:#991b1b; }
  .result.D { background:#fef9c3; color:#854d0e; }
  .pending { color:#a1a1aa; font-style:italic; font-size:13px; }
  .copy-btn { background:#b91c1c; color:#fff; border:0; border-radius:6px; padding:6px 12px; font-size:13px; cursor:pointer; }
  .copy-btn:hover { background:#991b1b; }
  .empty { color:#71717a; padding:20px; text-align:center; }
  .round-date { color:#71717a; font-size:13px; margin:-6px 0 16px; }
</style>
</head>
<body>
  <h1>🏑 Essendon Hockey — Results</h1>
  <div class="updated" id="updated">Loading…</div>
  <div class="tabs" id="tabs"></div>
  <div class="round-date" id="roundDate"></div>
  <div id="content"></div>

<script>
const CLUB = "Essendon Hockey";
function isEss(name){ return name.includes(CLUB); }
function bold(name){ return isEss(name) ? `<span class="ess">${name}</span>` : name; }
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

// Work out W/L/D from Essendon's perspective.
function essResult(game){
  if(!game.played || !game.score.includes('-')) return null;
  const [h, a] = game.score.split('-').map(n => parseInt(n, 10));
  if(isNaN(h) || isNaN(a)) return null;
  const essHome = isEss(game.home);
  const essGoals = essHome ? h : a;
  const oppGoals = essHome ? a : h;
  if(essGoals > oppGoals) return 'W';
  if(essGoals < oppGoals) return 'L';
  return 'D';
}

function postText(game, label, rn){
  if(!game.played){
    return `🏑 ${label} R${rn}: ${game.home} vs ${game.away} — ${fmtDate(game.date)} ${game.time}`;
  }
  const r = essResult(game);
  const ess = isEss(game.home) ? game.home : game.away;
  const opp = isEss(game.home) ? game.away : game.home;
  const [h, a] = game.score.split('-').map(n => parseInt(n, 10));
  const essGoals = isEss(game.home) ? h : a;
  const oppGoals = isEss(game.home) ? a : h;
  const verb = r === 'W' ? 'def.' : r === 'L' ? 'lost to' : 'drew with';
  return `🏑 ${label} R${rn}: ${ess} ${verb} ${opp} ${essGoals}–${oppGoals}`;
}

function renderRound(round, rn) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  document.getElementById('roundDate').textContent = round.date ? 'Played ' + fmtDate(round.date) : '';

  const byGrade = {};
  round.games.forEach(g => { (byGrade[g.grade] = byGrade[g.grade] || []).push(g); });

  Object.keys(byGrade).sort().forEach(label => {
    const g = document.createElement('div');
    g.className = 'grade';
    g.innerHTML = `<h2>${label}</h2>`;
    byGrade[label].forEach(game => {
      const r = essResult(game);
      const resultBadge = r ? `<span class="result ${r}">${r}</span>` : '';
      const scoreHtml = game.played
        ? `${resultBadge}<span class="score">${game.score}</span>`
        : `<span class="pending">${fmtDate(game.date)} ${game.time}</span>`;
      const post = postText(game, label, rn);
      const row = document.createElement('div');
      row.className = 'game';
      row.innerHTML =
        `<span class="teams">${bold(game.home)} vs ${bold(game.away)}</span>${scoreHtml}` +
        `<button class="copy-btn" onclick='navigator.clipboard.writeText(${JSON.stringify(post)});this.textContent="Copied!";setTimeout(()=>this.textContent="Copy post",1500)'>Copy post</button>`;
      g.appendChild(row);
    });
    content.appendChild(g);
  });
}

async function load() {
  try {
    const res = await fetch('results.json?' + Date.now());
    const data = await res.json();
    document.getElementById('updated').textContent = 'Last updated: ' + data.updated.replace('T',' ');

    const today = data.today;

    // Keep only rounds that have a date on/before today (no future rounds).
    const playedRounds = Object.keys(data.rounds)
      .filter(rn => { const d = data.rounds[rn].date; return d && d <= today; })
      // sort by DATE, not round number, so the timeline is correct
      .sort((a,b) => data.rounds[a].date.localeCompare(data.rounds[b].date));

    if (playedRounds.length === 0) {
      document.getElementById('content').innerHTML =
        '<div class="empty">No played rounds yet — check back after the next round.</div>';
      return;
    }

    const tabs = document.getElementById('tabs');

    // Default = round whose date is nearest to (but not after) today.
    let defaultRn = playedRounds[0];
    let bestGap = Infinity;
    const todayMs = new Date(today + 'T00:00:00').getTime();
    playedRounds.forEach(rn => {
      const gap = todayMs - new Date(data.rounds[rn].date + 'T00:00:00').getTime();
      if (gap >= 0 && gap < bestGap) { bestGap = gap; defaultRn = rn; }
    });

    function show(rn) {
      renderRound(data.rounds[rn], rn);
      tabs.querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', b.dataset.rn === rn));
    }

    playedRounds.forEach(rn => {
      const b = document.createElement('button');
      b.textContent = 'Round ' + rn;
      b.dataset.rn = rn;
      b.onclick = () => show(rn);
      tabs.appendChild(b);
    });

    show(defaultRn);
  } catch (e) {
    document.getElementById('updated').textContent = 'Could not load results.json yet. Run the scraper from the Actions tab.';
  }
}
load();
</script>
</body>
</html>
